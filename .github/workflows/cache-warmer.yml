name: Cloudflare Cache Warmer

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  warm-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Warm CSS, JS and Image
        run: |
          echo "Warming CSS..."
          curl -A "AFE-CacheWarmer" \
               -H "X-Cache-Warmer: ${{ secrets.CACHE_WARMER_KEY }}" \
               -s -D - -o /dev/null "https://astrologyfutureeye.com/css/afe-v-6.1.5.css" | grep -i cf-cache-status
          sleep 1

          echo "Warming JS..."
          curl -A "AFE-CacheWarmer" \
               -H "X-Cache-Warmer: ${{ secrets.CACHE_WARMER_KEY }}" \
               -s -D - -o /dev/null "https://astrologyfutureeye.com/formjs/afe-v-3.6.8.js" | grep -i cf-cache-status
          sleep 1

          echo "Warming Image..."
          curl -A "AFE-CacheWarmer" \
               -H "X-Cache-Warmer: ${{ secrets.CACHE_WARMER_KEY }}" \
               -s -D - -o /dev/null "https://astrologyfutureeye.com/images/header/afe-1.png" | grep -i cf-cache-status
          sleep 1

      - name: Fetch Sitemap.txt
        run: |
          curl -A "AFE-CacheWarmer" \
               -H "X-Cache-Warmer: ${{ secrets.CACHE_WARMER_KEY }}" \
               -s "https://astrologyfutureeye.com/Sitemap.txt" -o urls.txt

      - name: Debug URLs
        run: |
          echo "Total URLs:"
          wc -l urls.txt
          echo "First few URLs:"
          head -n 5 urls.txt

      - name: Limit URLs
        run: |
          head -n 500 urls.txt > warm_urls.txt

      - name: Warm + Check cache (single request per URL)
        run: |
          echo "Warming pages and checking cache..."

          while IFS= read -r url; do
            [ -z "$url" ] && continue

            headers=$(curl -A "AFE-CacheWarmer" \
              -H "X-Cache-Warmer: ${{ secrets.CACHE_WARMER_KEY }}" \
              -s -D - -o /dev/null "$url")

            status=$(echo "$headers" | grep -i cf-cache-status)

            echo "$url → $status"

            sleep 0.8
          done < warm_urls.txt
