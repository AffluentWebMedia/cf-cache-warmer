name: Cloudflare Cache Warmer

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  warm-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Warm CSS and JS
        run: |
          echo "Warming CSS..."
          curl -A "Mozilla/5.0" -L -s "https://astrologyfutureeye.com/css/afe-v-6.1.5.css" > /dev/null
          sleep 1

          echo "Warming JS..."
          curl -A "Mozilla/5.0" -L -s "https://astrologyfutureeye.com/formjs/afe-v-3.6.8.js" > /dev/null
          sleep 1

      - name: Fetch sitemap.txt
        run: |
          curl -s "https://astrologyfutureeye.com/Sitemap.txt" -o urls.txt

      - name: Debug URLs
        run: |
          echo "Total URLs:"
          wc -l urls.txt
          echo "First few URLs:"
          head -n 5 urls.txt

      - name: Limit URLs
        run: |
          head -n 250 urls.txt > warm_urls.txt

      - name: Warm cache with delay
        run: |
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            echo "Fetching $url"
            curl -A "Mozilla/5.0" -L -s "$url" > /dev/null
            sleep 0.4
          done < warm_urls.txt
